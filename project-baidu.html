<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>百度网盘-体验设计升级 | 奇点同行</title>
  <style>
    :root {
      --purple: #4408a6;
      --purple-2: #7a4dff;
      --ink: #1f2329;
      --muted: #5f6270;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
              text-size-adjust: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-weight: 400;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, Helvetica Neue, Arial, Segoe UI, PingFang SC, Microsoft Yahei, Hiragino Sans GB, sans-serif, Apple Color Emoji, Segoe UI Emoji, Segoe UI Symbol, Noto Color Emoji;
      background: url("assets/figma-portfolio/bg-gradient.png") center top / cover fixed no-repeat, #f3f0ff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    .nav {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr) max-content;
      align-items: center;
      column-gap: 20px;
      height: 60px;
      padding: 0 max(24px, calc((100vw - 1440px) / 2));
      background: transparent;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      color: var(--ink);
      font-size: 18px;
      justify-self: start;
      white-space: nowrap;
    }

    .brand-mark {
      position: relative;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(136deg, #9363f4 10%, #e885d8 105%);
      box-shadow: 2px 4px 10px rgba(212, 99, 243, .27);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      top: 2px;
      right: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #88dcff;
    }

    .nav-links {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-size: 18px;
      min-width: 0;
      width: max-content;
      justify-self: center;
    }

    .nav-links span,
    .nav-links a {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      white-space: nowrap;
      color: var(--ink);
    }

    .nav-links span.active {
      color: #4d32ce;
      background: #eee9ff;
    }

    .download {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 400;
      color: var(--ink);
      justify-self: end;
      white-space: nowrap;
    }

    .download::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: #d9d9d9;
    }

    .detail-main {
      min-height: calc(100vh - 60px);
      padding: 0 max(80px, calc((100vw - 1440px) / 2));
      background: url("assets/figma-portfolio/Mask group (1).png") top center / 100% auto no-repeat;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="nav">
      <a class="brand" href="index.html">
        <span class="brand-mark"></span>
        <span>奇点同行</span>
      </a>
      <span class="nav-links">
        <a href="index.html">首页</a>
        <span class="active">UX 项目</span>
        <span>视觉项目</span>
        <span>设计笔记</span>
        <span>关于我</span>
      </span>
      <span class="download">下载 PDF 作品集</span>
    </header>
    <main class="detail-main"></main>
  </div>
</body>
</html>
